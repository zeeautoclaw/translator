<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Two-Way Translator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  /* Setup Screen */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    gap: 20px;
  }
  #setup h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  #setup p { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
  .field { width: 100%; max-width: 340px; }
  .field label {
    display: block;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 16px;
    appearance: none;
    cursor: pointer;
    outline: none;
  }
  .field select:focus { border-color: #818cf8; }
  #startBtn {
    margin-top: 12px;
    padding: 16px 48px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  #startBtn:active { transform: scale(0.96); opacity: 0.9; }

  /* Main Screen */
  #main {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    flex-shrink: 0;
  }
  .header .lang-pair {
    font-size: 15px;
    font-weight: 600;
    color: #cbd5e1;
  }
  .header .lang-pair span { color: #818cf8; }
  #backBtn {
    padding: 6px 14px;
    border: 1px solid #475569;
    border-radius: 8px;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
  }

  /* Transcript area */
  .transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .transcript-area:empty::before {
    content: 'Hold a button below and speak to translate';
    color: #475569;
    text-align: center;
    margin-top: 40px;
    font-size: 15px;
  }
  .entry {
    background: #1e293b;
    border-radius: 12px;
    padding: 14px;
    border-left: 3px solid #818cf8;
    animation: fadeIn 0.25s ease;
  }
  .entry.right { border-left-color: #38bdf8; }
  .entry .original {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 6px;
  }
  .entry .translated {
    font-size: 17px;
    font-weight: 500;
    color: #f1f5f9;
  }
  .entry .meta {
    font-size: 11px;
    color: #64748b;
    margin-top: 6px;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Status bar */
  .status-bar {
    text-align: center;
    padding: 8px;
    font-size: 13px;
    color: #64748b;
    flex-shrink: 0;
    min-height: 34px;
  }
  .status-bar.recording {
    color: #f87171;
    font-weight: 600;
    animation: pulse 1s infinite;
  }
  .status-bar.processing { color: #fbbf24; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    padding: 12px 16px 24px;
    flex-shrink: 0;
  }
  .talk-btn {
    flex: 1;
    padding: 28px 12px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .talk-btn .icon { font-size: 28px; }
  .talk-btn .lang-label { font-size: 13px; font-weight: 500; opacity: 0.85; }
  .talk-btn { -webkit-touch-callout: none; touch-action: none; }
  #btnA {
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff;
  }
  #btnB {
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    color: #fff;
  }
  .talk-btn:active, .talk-btn.active {
    transform: scale(0.95);
    box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.35);
  }
  .talk-btn.active::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    animation: pulse 0.8s infinite;
  }

  /* Scrollbar */
  .transcript-area::-webkit-scrollbar { width: 4px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup">
  <h1>Translator</h1>
  <p>Select languages and start translating</p>
  <div class="field">
    <label for="myLang">My Language</label>
    <select id="myLang"></select>
  </div>
  <div class="field">
    <label for="targetLang">Target Language</label>
    <select id="targetLang"></select>
  </div>
  <button id="startBtn">Start Translating</button>
</div>

<!-- Main Screen -->
<div id="main">
  <div class="header">
    <div class="lang-pair"><span id="langA"></span> &harr; <span id="langB"></span></div>
    <button id="backBtn">Change</button>
  </div>
  <div class="transcript-area" id="transcript"></div>
  <div class="status-bar" id="status"></div>
  <div class="btn-row">
    <button class="talk-btn" id="btnA">
      <span class="icon">&#127908;</span>
      <span class="lang-label" id="btnALabel"></span>
    </button>
    <button class="talk-btn" id="btnB">
      <span class="icon">&#127908;</span>
      <span class="lang-label" id="btnBLabel"></span>
    </button>
  </div>
</div>

<script>
// Warn if opened from file:// — mic permissions won't persist
if (location.protocol === 'file:') {
  document.getElementById('setup').insertAdjacentHTML('afterbegin',
    '<div style="background:#7c2d12;color:#fed7aa;padding:12px 16px;border-radius:10px;font-size:13px;max-width:340px;text-align:center;margin-bottom:8px;">' +
    'Opened from file://. Microphone will re-prompt each time.<br>' +
    '<b>For best experience, double-click <code>start-translator.command</code></b> on your Desktop instead.' +
    '</div>'
  );
}

const LANGUAGES = [
  { code: 'en', name: 'English', speech: 'en-US' },
  { code: 'es', name: 'Spanish', speech: 'es-ES' },
  { code: 'fr', name: 'French', speech: 'fr-FR' },
  { code: 'de', name: 'German', speech: 'de-DE' },
  { code: 'it', name: 'Italian', speech: 'it-IT' },
  { code: 'pt', name: 'Portuguese', speech: 'pt-BR' },
  { code: 'ru', name: 'Russian', speech: 'ru-RU' },
  { code: 'zh', name: 'Chinese', speech: 'zh-CN' },
  { code: 'ja', name: 'Japanese', speech: 'ja-JP' },
  { code: 'ko', name: 'Korean', speech: 'ko-KR' },
  { code: 'ar', name: 'Arabic', speech: 'ar-SA' },
  { code: 'hi', name: 'Hindi', speech: 'hi-IN' },
  { code: 'nl', name: 'Dutch', speech: 'nl-NL' },
  { code: 'pl', name: 'Polish', speech: 'pl-PL' },
  { code: 'tr', name: 'Turkish', speech: 'tr-TR' },
  { code: 'vi', name: 'Vietnamese', speech: 'vi-VN' },
  { code: 'th', name: 'Thai', speech: 'th-TH' },
  { code: 'sv', name: 'Swedish', speech: 'sv-SE' },
  { code: 'uk', name: 'Ukrainian', speech: 'uk-UA' },
  { code: 'cs', name: 'Czech', speech: 'cs-CZ' },
];

let myLang = null, targetLang = null;
let recognition = null;
let isRecording = false;
let activeBtn = null;

// Populate dropdowns
const myLangSel = document.getElementById('myLang');
const targetLangSel = document.getElementById('targetLang');

LANGUAGES.forEach((lang, i) => {
  const o1 = new Option(lang.name, lang.code);
  const o2 = new Option(lang.name, lang.code);
  myLangSel.add(o1);
  targetLangSel.add(o2);
});
myLangSel.value = 'en';
targetLangSel.value = 'es';

// Setup -> Main transition
document.getElementById('startBtn').addEventListener('click', async () => {
  myLang = LANGUAGES.find(l => l.code === myLangSel.value);
  targetLang = LANGUAGES.find(l => l.code === targetLangSel.value);
  if (myLang.code === targetLang.code) {
    alert('Please select two different languages.');
    return;
  }

  document.getElementById('langA').textContent = myLang.name;
  document.getElementById('langB').textContent = targetLang.name;
  document.getElementById('btnALabel').textContent = 'Speak ' + myLang.name;
  document.getElementById('btnBLabel').textContent = 'Speak ' + targetLang.name;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
});

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('main').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('transcript').innerHTML = '';
  setStatus('');
});

// Speech Recognition — single reusable instance to avoid repeated permission prompts
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let pendingStop = false;
let recordingStartTime = 0;
const MIN_RECORD_MS = 800;
let fullTranscript = '';
let currentSourceLang = null;
let currentTargetLang = null;
let currentSide = null;

// Create one instance and reuse it
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
  recognition.continuous = true;

  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        fullTranscript += e.results[i][0].transcript + ' ';
      }
    }
    if (pendingStop) doStop();
  };

  recognition.onerror = (e) => {
    console.warn('Speech error:', e.error);
    if (e.error !== 'aborted' && e.error !== 'no-speech') {
      setStatus('Could not recognize speech. Try again.', '');
    }
    cleanup();
  };

  recognition.onend = () => {
    const src = currentSourceLang;
    const tgt = currentTargetLang;
    const side = currentSide;
    const wasRecording = isRecording;
    cleanup();
    const text = fullTranscript.trim();
    fullTranscript = '';
    if (text && src && tgt) {
      processTranslation(text, src, tgt, side);
    } else if (wasRecording) {
      setStatus('No speech detected. Hold button and speak clearly.', '');
    }
  };
}

function startRecording(sourceLang, targetLangObj, side) {
  if (isRecording || !recognition) return;
  isRecording = true;
  pendingStop = false;
  activeBtn = side;
  recordingStartTime = Date.now();
  fullTranscript = '';
  currentSourceLang = sourceLang;
  currentTargetLang = targetLangObj;
  currentSide = side;

  const btn = document.getElementById(side);
  btn.classList.add('active');
  setStatus('Listening... (release to finish)', 'recording');

  recognition.lang = sourceLang.speech;

  try {
    recognition.start();
  } catch(e) {
    console.error('Failed to start recognition:', e);
    cleanup();
    setStatus('Speech recognition unavailable.', '');
  }
}

function doStop() {
  if (!recognition) return;
  pendingStop = false;
  try { recognition.stop(); } catch(e) {}
}

function stopRecording() {
  if (!isRecording || !recognition) return;
  const elapsed = Date.now() - recordingStartTime;
  if (elapsed < MIN_RECORD_MS) {
    pendingStop = true;
    setTimeout(() => {
      if (pendingStop && recognition) doStop();
    }, MIN_RECORD_MS - elapsed);
  } else {
    doStop();
  }
}

function cleanup() {
  isRecording = false;
  pendingStop = false;
  if (activeBtn) {
    document.getElementById(activeBtn).classList.remove('active');
    activeBtn = null;
  }
}

// Translation via Google Translate (free endpoint, high quality)
async function processTranslation(text, fromLang, toLang, side) {
  setStatus('Translating...', 'processing');
  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' +
      encodeURIComponent(fromLang.code) + '&tl=' + encodeURIComponent(toLang.code) +
      '&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    const data = await res.json();
    const translated = data[0].map(seg => seg[0]).join('');

    addEntry(text, translated, fromLang.name, toLang.name, side === 'btnA' ? 'left' : 'right');
    setStatus('');
    speak(translated, toLang.speech);
  } catch (err) {
    console.error('Translation error:', err);
    setStatus('Translation failed. Check connection.', '');
  }
}

// Text-to-Speech
function speak(text, lang) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = 0.95;

  // Try to find a matching voice
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (match) utter.voice = match;

  window.speechSynthesis.speak(utter);
}

// Ensure voices are loaded
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// UI Helpers
function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-bar' + (cls ? ' ' + cls : '');
}

function addEntry(original, translated, fromName, toName, side) {
  const div = document.createElement('div');
  div.className = 'entry' + (side === 'right' ? ' right' : '');
  div.innerHTML =
    '<div class="original">' + escHtml(original) + '</div>' +
    '<div class="translated">' + escHtml(translated) + '</div>' +
    '<div class="meta">' + escHtml(fromName) + ' &rarr; ' + escHtml(toName) + '</div>';
  const area = document.getElementById('transcript');
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Button event handlers (mouse + touch)
// IMPORTANT: Do NOT preventDefault on touchstart — iOS Safari needs the user
// gesture intact for SpeechRecognition.start() to work. CSS touch-action:none
// on the buttons handles scroll/zoom prevention instead.
function setupButton(btnId, sourceFn, targetFn) {
  const btn = document.getElementById(btnId);
  let usedTouch = false;

  function onDown(e) {
    if (e.type === 'touchstart') usedTouch = true;
    if (e.type === 'mousedown' && usedTouch) return;
    startRecording(sourceFn(), targetFn(), btnId);
  }

  function onUp(e) {
    if (e.type === 'mouseup' && usedTouch) { usedTouch = false; return; }
    stopRecording();
  }

  btn.addEventListener('mousedown', onDown);
  btn.addEventListener('mouseup', onUp);
  btn.addEventListener('touchstart', onDown, { passive: true });
  btn.addEventListener('touchend', onUp, { passive: false });
  btn.addEventListener('touchcancel', onUp, { passive: false });
}

setupButton('btnA', () => myLang, () => targetLang);
setupButton('btnB', () => targetLang, () => myLang);

// Prevent context menu on long press
// Stop recording if finger moves off button (iOS)
document.addEventListener('touchend', () => { if (isRecording) stopRecording(); });

// Prevent context menu on long press
document.addEventListener('contextmenu', e => {
  if (e.target.closest('.talk-btn')) e.preventDefault();
});
</script>
</body>
</html>
