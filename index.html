<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Two-Way Translator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  /* Setup Screen */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    gap: 20px;
  }
  #setup h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  #setup p { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
  .field { width: 100%; max-width: 340px; }
  .field label {
    display: block;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 16px;
    appearance: none;
    cursor: pointer;
    outline: none;
  }
  .field select:focus { border-color: #818cf8; }
  #startBtn {
    margin-top: 12px;
    padding: 16px 48px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  #startBtn:active { transform: scale(0.96); opacity: 0.9; }

  /* Main Screen */
  #main {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    flex-shrink: 0;
  }
  .header .lang-pair {
    font-size: 15px;
    font-weight: 600;
    color: #cbd5e1;
  }
  .header .lang-pair span { color: #818cf8; }
  #backBtn {
    padding: 6px 14px;
    border: 1px solid #475569;
    border-radius: 8px;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
  }

  /* Transcript area */
  .transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .transcript-area:empty::before {
    content: 'Hold a button below and speak to translate';
    color: #475569;
    text-align: center;
    margin-top: 40px;
    font-size: 15px;
  }
  .entry {
    background: #1e293b;
    border-radius: 12px;
    padding: 14px;
    border-left: 3px solid #818cf8;
    animation: fadeIn 0.25s ease;
  }
  .entry.right { border-left-color: #38bdf8; }
  .entry .original {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 6px;
  }
  .entry .translated {
    font-size: 17px;
    font-weight: 500;
    color: #f1f5f9;
  }
  .entry .meta {
    font-size: 11px;
    color: #64748b;
    margin-top: 6px;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Status bar */
  .status-bar {
    text-align: center;
    padding: 8px;
    font-size: 13px;
    color: #64748b;
    flex-shrink: 0;
    min-height: 34px;
  }
  .status-bar.recording {
    color: #f87171;
    font-weight: 600;
    animation: pulse 1s infinite;
  }
  .status-bar.processing { color: #fbbf24; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    padding: 12px 16px 24px;
    flex-shrink: 0;
  }
  .talk-btn {
    flex: 1;
    padding: 28px 12px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .talk-btn .icon { font-size: 28px; }
  .talk-btn .lang-label { font-size: 13px; font-weight: 500; opacity: 0.85; }
  .talk-btn { -webkit-touch-callout: none; touch-action: none; }
  #btnA {
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff;
  }
  #btnB {
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    color: #fff;
  }
  .talk-btn:active, .talk-btn.active {
    transform: scale(0.95);
    box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.35);
  }
  .talk-btn.active::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    animation: pulse 0.8s infinite;
  }

  /* Scrollbar */
  .transcript-area::-webkit-scrollbar { width: 4px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup">
  <h1>Translator</h1>
  <p>Select languages and start translating</p>
  <div class="field">
    <label for="myLang">My Language</label>
    <select id="myLang"></select>
  </div>
  <div class="field">
    <label for="targetLang">Target Language</label>
    <select id="targetLang"></select>
  </div>
  <button id="startBtn">Start Translating</button>
</div>

<!-- Main Screen -->
<div id="main">
  <div class="header">
    <div class="lang-pair"><span id="langA"></span> &harr; <span id="langB"></span></div>
    <button id="backBtn">Change</button>
  </div>
  <div class="transcript-area" id="transcript"></div>
  <div class="status-bar" id="status"></div>
  <div id="debug" style="background:#1a1a2e;color:#4ade80;font-family:monospace;font-size:11px;padding:8px 12px;max-height:120px;overflow-y:auto;flex-shrink:0;border-top:1px solid #334155;"></div>
  <div class="btn-row">
    <button class="talk-btn" id="btnA">
      <span class="icon">&#127908;</span>
      <span class="lang-label" id="btnALabel"></span>
    </button>
    <button class="talk-btn" id="btnB">
      <span class="icon">&#127908;</span>
      <span class="lang-label" id="btnBLabel"></span>
    </button>
  </div>
</div>

<script>
// Debug logger — shows what's happening with speech recognition
function dbg(msg) {
  const el = document.getElementById('debug');
  if (!el) return;
  const t = new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML += '<div>' + t + ' ' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

const LANGUAGES = [
  { code: 'en', name: 'English', speech: 'en-US' },
  { code: 'es', name: 'Spanish', speech: 'es-ES' },
  { code: 'fr', name: 'French', speech: 'fr-FR' },
  { code: 'de', name: 'German', speech: 'de-DE' },
  { code: 'it', name: 'Italian', speech: 'it-IT' },
  { code: 'pt', name: 'Portuguese', speech: 'pt-BR' },
  { code: 'ru', name: 'Russian', speech: 'ru-RU' },
  { code: 'zh', name: 'Chinese', speech: 'zh-CN' },
  { code: 'ja', name: 'Japanese', speech: 'ja-JP' },
  { code: 'ko', name: 'Korean', speech: 'ko-KR' },
  { code: 'ar', name: 'Arabic', speech: 'ar-SA' },
  { code: 'hi', name: 'Hindi', speech: 'hi-IN' },
  { code: 'nl', name: 'Dutch', speech: 'nl-NL' },
  { code: 'pl', name: 'Polish', speech: 'pl-PL' },
  { code: 'tr', name: 'Turkish', speech: 'tr-TR' },
  { code: 'vi', name: 'Vietnamese', speech: 'vi-VN' },
  { code: 'th', name: 'Thai', speech: 'th-TH' },
  { code: 'sv', name: 'Swedish', speech: 'sv-SE' },
  { code: 'uk', name: 'Ukrainian', speech: 'uk-UA' },
  { code: 'cs', name: 'Czech', speech: 'cs-CZ' },
];

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

let myLang = null, targetLang = null;
let recognition = null;
let isRecording = false;
let activeBtn = null;
let micGranted = false;

// Populate dropdowns
const myLangSel = document.getElementById('myLang');
const targetLangSel = document.getElementById('targetLang');
LANGUAGES.forEach(lang => {
  myLangSel.add(new Option(lang.name, lang.code));
  targetLangSel.add(new Option(lang.name, lang.code));
});
myLangSel.value = 'en';
targetLangSel.value = 'es';

// Show warning if Speech Recognition is not supported (e.g. Firefox)
if (!SpeechRecognition) {
  document.getElementById('setup').insertAdjacentHTML('afterbegin',
    '<div style="background:#7c2d12;color:#fed7aa;padding:12px 16px;border-radius:10px;font-size:13px;max-width:340px;text-align:center;margin-bottom:8px;">' +
    'Speech recognition is not supported in this browser. Please use Chrome, Edge, or Safari.' +
    '</div>');
}

// Setup -> Main transition
// Request mic permission here so SpeechRecognition has access later
document.getElementById('startBtn').addEventListener('click', async () => {
  myLang = LANGUAGES.find(l => l.code === myLangSel.value);
  targetLang = LANGUAGES.find(l => l.code === targetLangSel.value);
  if (myLang.code === targetLang.code) {
    alert('Please select two different languages.');
    return;
  }

  // Grant mic permission once (stop tracks immediately — just need the grant)
  if (!micGranted) {
    dbg('Requesting mic permission...');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const tracks = stream.getTracks();
      dbg('Mic granted! Tracks: ' + tracks.map(t => t.kind + '/' + t.readyState).join(', '));
      tracks.forEach(t => t.stop());
      micGranted = true;
    } catch (err) {
      dbg('Mic DENIED: ' + err.name + ' - ' + err.message);
      alert('Microphone access is required. Please allow it and try again.');
      return;
    }
  }

  // On iOS, also test Speech Recognition permission (separate from mic)
  if (isIOS && SpeechRecognition && !window._speechPermOk) {
    dbg('Testing iOS Speech Recognition permission...');
    try {
      await new Promise((resolve, reject) => {
        const testRec = new SpeechRecognition();
        testRec.lang = 'en-US';
        testRec.continuous = false;
        testRec.interimResults = false;
        const timeout = setTimeout(() => { testRec.abort(); resolve(); }, 2000);
        testRec.onaudiostart = () => {
          dbg('iOS Speech Recognition permission OK!');
          window._speechPermOk = true;
          clearTimeout(timeout);
          testRec.abort();
          resolve();
        };
        testRec.onerror = (e) => {
          clearTimeout(timeout);
          dbg('iOS Speech Recognition error: ' + e.error);
          if (e.error === 'service-not-allowed' || e.error === 'not-allowed') {
            reject(e.error);
          } else {
            resolve(); // other errors are OK (e.g. no-speech)
          }
        };
        testRec.onend = () => { clearTimeout(timeout); resolve(); };
        testRec.start();
      });
    } catch (err) {
      alert('Speech Recognition permission is required.\n\nOn iPhone, go to:\nSettings > Safari > Microphone > Allow\n\nAlso check:\nSettings > Privacy & Security > Speech Recognition > Safari > Allow\n\nThen try again.');
      return;
    }
  }

  document.getElementById('langA').textContent = myLang.name;
  document.getElementById('langB').textContent = targetLang.name;
  document.getElementById('btnALabel').textContent = 'Speak ' + myLang.name;
  document.getElementById('btnBLabel').textContent = 'Speak ' + targetLang.name;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
});

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('main').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('transcript').innerHTML = '';
  setStatus('');
});

// --- Speech Recognition ---
// Create a FRESH instance each time to avoid iOS Safari bugs with reuse.
// On HTTPS, mic permission persists so no re-prompting.
let pendingStop = false;
let recordingStartTime = 0;
const MIN_RECORD_MS = 1000;
let fullTranscript = '';
let interimTranscript = ''; // fallback for iOS which may not send isFinal
let currentSourceLang = null;
let currentTargetLang = null;
let currentSide = null;

function createRecognition(lang) {
  dbg('Creating SpeechRecognition, lang=' + lang + ', iOS=' + isIOS);
  const rec = new SpeechRecognition();
  rec.lang = lang;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  rec.continuous = !isIOS;

  rec.onaudiostart = () => dbg('EVENT: audiostart (mic is capturing)');
  rec.onsoundstart = () => dbg('EVENT: soundstart (sound detected)');
  rec.onspeechstart = () => dbg('EVENT: speechstart (speech detected!)');
  rec.onspeechend = () => dbg('EVENT: speechend');
  rec.onsoundend = () => dbg('EVENT: soundend');
  rec.onaudioend = () => dbg('EVENT: audioend');

  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const txt = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        dbg('FINAL: "' + txt + '"');
        fullTranscript += txt + ' ';
      } else {
        interim += txt;
      }
    }
    // Always track latest interim result as fallback (iOS often never sends isFinal)
    if (interim) {
      interimTranscript = interim;
      dbg('INTERIM: "' + interim + '"');
    }
    if (pendingStop) doStop();
  };

  rec.onerror = (e) => {
    dbg('ERROR: ' + e.error + ' (message: ' + (e.message || 'none') + ')');
    cleanup();
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      if (isIOS) {
        setStatus('Enable Speech Recognition in iPhone Settings > Safari.', '');
      } else {
        setStatus('Mic access denied. Check browser settings.', '');
      }
    } else if (e.error === 'no-speech') {
      setStatus('No speech detected. Hold and speak clearly.', '');
    } else if (e.error !== 'aborted') {
      setStatus('Error: ' + e.error + '. Try again.', '');
    }
  };

  rec.onend = () => {
    // Use final transcript, or fall back to interim (iOS often never marks results as final)
    let text = fullTranscript.trim();
    if (!text && interimTranscript) {
      text = interimTranscript.trim();
      dbg('Using interim fallback: "' + text + '"');
    }
    dbg('EVENT: end (text: "' + text + '")');
    const src = currentSourceLang, tgt = currentTargetLang, side = currentSide;
    const wasRecording = isRecording;
    cleanup();
    fullTranscript = '';
    interimTranscript = '';
    if (text && src && tgt) {
      processTranslation(text, src, tgt, side);
    } else if (wasRecording) {
      setStatus('No speech detected. Hold and speak clearly.', '');
    }
  };

  return rec;
}

function startRecording(sourceLang, targetLangObj, side) {
  if (isRecording || !SpeechRecognition) return;
  // Stop any TTS that might interfere with mic
  window.speechSynthesis.cancel();

  isRecording = true;
  pendingStop = false;
  activeBtn = side;
  recordingStartTime = Date.now();
  fullTranscript = '';
  interimTranscript = '';
  currentSourceLang = sourceLang;
  currentTargetLang = targetLangObj;
  currentSide = side;

  document.getElementById(side).classList.add('active');
  setStatus('Listening... (release to finish)', 'recording');

  // Fresh instance each time — avoids iOS reuse bugs
  recognition = createRecognition(sourceLang.speech);

  try {
    recognition.start();
    dbg('recognition.start() called OK');
  } catch(e) {
    dbg('recognition.start() THREW: ' + e.name + ' - ' + e.message);
    cleanup();
    setStatus('Speech recognition failed. Try again.', '');
  }
}

function doStop() {
  if (!recognition) return;
  pendingStop = false;
  dbg('Calling recognition.stop()');
  try { recognition.stop(); } catch(e) { dbg('stop() error: ' + e.message); }
}

function stopRecording() {
  if (!isRecording || !recognition) return;
  const elapsed = Date.now() - recordingStartTime;
  if (elapsed < MIN_RECORD_MS) {
    pendingStop = true;
    setTimeout(() => {
      if (pendingStop && recognition) doStop();
    }, MIN_RECORD_MS - elapsed);
  } else {
    doStop();
  }
}

function cleanup() {
  isRecording = false;
  pendingStop = false;
  if (activeBtn) {
    document.getElementById(activeBtn).classList.remove('active');
    activeBtn = null;
  }
  recognition = null;
}

// --- Translation via Google Translate ---
async function processTranslation(text, fromLang, toLang, side) {
  setStatus('Translating...', 'processing');
  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' +
      encodeURIComponent(fromLang.code) + '&tl=' + encodeURIComponent(toLang.code) +
      '&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    const data = await res.json();
    const translated = data[0].map(seg => seg[0]).join('');

    addEntry(text, translated, fromLang.name, toLang.name, side === 'btnA' ? 'left' : 'right');
    setStatus('');
    speak(translated, toLang.speech);
  } catch (err) {
    console.error('Translation error:', err);
    setStatus('Translation failed. Check connection.', '');
  }
}

// --- Text-to-Speech via Google TTS audio (works on iOS without gesture restrictions) ---
let ttsAudio = null;
function speak(text, lang) {
  // Stop any playing audio
  if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }

  // Google TTS endpoint — split long text into chunks of 200 chars
  const langCode = lang.split('-')[0];
  const chunks = [];
  let remaining = text;
  while (remaining.length > 0) {
    chunks.push(remaining.substring(0, 200));
    remaining = remaining.substring(200);
  }

  let i = 0;
  function playNext() {
    if (i >= chunks.length) return;
    const url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=' +
      encodeURIComponent(langCode) + '&q=' + encodeURIComponent(chunks[i]);
    ttsAudio = new Audio(url);
    ttsAudio.onended = () => { i++; playNext(); };
    ttsAudio.onerror = (e) => dbg('TTS audio error: ' + e.type);
    ttsAudio.play().catch(e => dbg('TTS play error: ' + e.message));
  }
  playNext();
}

// --- UI Helpers ---
function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-bar' + (cls ? ' ' + cls : '');
}

function addEntry(original, translated, fromName, toName, side) {
  const div = document.createElement('div');
  div.className = 'entry' + (side === 'right' ? ' right' : '');
  div.innerHTML =
    '<div class="original">' + escHtml(original) + '</div>' +
    '<div class="translated">' + escHtml(translated) + '</div>' +
    '<div class="meta">' + escHtml(fromName) + ' &rarr; ' + escHtml(toName) + '</div>';
  const area = document.getElementById('transcript');
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Button event handlers ---
function setupButton(btnId, sourceFn, targetFn) {
  const btn = document.getElementById(btnId);
  let usedTouch = false;

  function onDown(e) {
    if (e.type === 'touchstart') usedTouch = true;
    if (e.type === 'mousedown' && usedTouch) return;
    startRecording(sourceFn(), targetFn(), btnId);
  }

  function onUp(e) {
    if (e.type === 'mouseup' && usedTouch) { usedTouch = false; return; }
    if (isRecording) stopRecording();
  }

  btn.addEventListener('mousedown', onDown);
  btn.addEventListener('mouseup', onUp);
  btn.addEventListener('touchstart', onDown, { passive: true });
  btn.addEventListener('touchend', onUp, { passive: true });
  btn.addEventListener('touchcancel', onUp, { passive: true });
}

setupButton('btnA', () => myLang, () => targetLang);
setupButton('btnB', () => targetLang, () => myLang);

// Stop recording if touch ends anywhere (finger slid off button)
document.addEventListener('touchend', () => { if (isRecording) stopRecording(); });

// Prevent context menu on long press mobile
document.addEventListener('contextmenu', e => {
  if (e.target.closest('.talk-btn')) e.preventDefault();
});
</script>
</body>
</html>
